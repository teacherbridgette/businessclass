<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>student recording game</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --blue: #0984e3; --green: #00b894; --done: #2ecc71; --red: #d63031; }
        body { 
            font-family: 'Fredoka', "Comic Sans MS", cursive, sans-serif; 
            background-color: #1e272e; margin: 0; display: flex; 
            justify-content: center; align-items: center; height: 100vh; 
            overflow: hidden; text-transform: lowercase; 
        }
        .game-canvas { 
            width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; 
            background: #ffffff; position: relative; display: flex; 
            flex-direction: column; align-items: center; padding: 2%; 
            box-sizing: border-box; border-radius: 20px; border: 10px solid var(--blue); 
        }
        h1 { color: var(--green); margin: 0; font-size: 4vw; font-weight: 700; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5%; width: 95%; height: 70%; margin-top: 10px; }
        .pill { 
            background: var(--blue); border: none; border-radius: 100px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 3.5vw; font-weight: 700; cursor: pointer; color: white; 
            box-shadow: 0 0.5vw 0 #054475; transition: 0.1s;
        }
        .pill:nth-child(even) { background: var(--green); box-shadow: 0 0.5vw 0 #00705a; }
        .pill.completed { background: var(--done) !important; box-shadow: 0 0.5vw 0 #27ae60 !important; pointer-events: none; opacity: 0.7; }
        #overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100; }
        .modal { background: white; padding: 4%; border-radius: 40px; text-align: center; width: 55%; border: 8px solid var(--green); }
        .word-display { font-size: 8vw; color: var(--red); margin: 15px 0; font-weight: 700; }
        
        button { 
            font-family: inherit; font-size: 2.2vw; padding: 2.5%; border-radius: 60px; 
            border: none; cursor: pointer; color: white; width: 100%; 
            margin-bottom: 10px; font-weight: 700; display: flex; 
            align-items: center; justify-content: center; gap: 10px;
        }
        .btn-start { background: var(--green); }
        .btn-stop { background: var(--red); display: none; }
        .btn-close { background: #636e72; font-size: 1.5vw; }
        #status { font-size: 1.5vw; margin-top: 10px; color: var(--blue); font-weight: 700; }
        
        /* Recording Animation */
        .recording-pulse { width: 15px; height: 15px; background: white; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="game-canvas">
        <h1>請選擇你的座號 (pick a number)</h1>
        <div class="grid" id="grid"></div>
        <div id="overlay">
            <div class="modal">
                <div class="word-display" id="wordBox">word</div>
                
                <button id="startBtn" class="btn-start" onclick="startRec()">
                    <i data-lucide="mic"></i> 開始錄音 (start record)
                </button>
                
                <button id="stopBtn" class="btn-stop" onclick="stopRec()">
                    <div class="recording-pulse"></div> 結束並儲存 (end & save)
                </button>
                
                <button class="btn-close" onclick="closeModal()">
                    <i data-lucide="x-circle"></i> 關閉 (close)
                </button>
                
                <div id="status">準備好了 (ready)</div>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwZnYExVEL9ooojJ4MicbuX_MGm6r5xnpUAYzJ1sQzCuP8Wa_A2fg6sPEiUAXGnL2okOw/exec';
        const words = ["draw", "read", "write", "sing", "dance", "jump", "swim"];
        let curNum, curPill, recorder, chunks = [];

        // Audio Context for the "Success" Ding
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSuccessSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // High A note
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // Initialize Lucide Icons
        lucide.createIcons();

        for (let i = 1; i <= 25; i++) {
            const p = document.createElement('div');
            p.className = 'pill'; p.innerText = i;
            p.onclick = () => {
                curNum = i; curPill = p;
                document.getElementById('wordBox').innerText = words[Math.floor(Math.random()*words.length)];
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('status').innerText = "點擊按鈕開始 (tap to start)";
            };
            document.getElementById('grid').appendChild(p);
        }

        async function startRec() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(stream, { audioBitsPerSecond: 64000 });
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = upload;
                recorder.start();
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'flex';
                document.getElementById('status').innerText = "正在錄音... (recording)";
            } catch (err) {
                document.getElementById('status').innerText = "麥克風錯誤! (mic error)";
            }
        }

        function stopRec() {
            recorder.stop();
            document.getElementById('status').innerText = "正在儲存... (saving)";
        }

        function upload() {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = () => {
                const base64 = reader.result.split(',')[1];
                const params = new URLSearchParams();
                params.append('audio', base64);
                params.append('filename', 'student_' + curNum + '_' + Date.now() + '.webm');

                fetch(scriptURL, {
                    method: 'POST',
                    body: params,
                    mode: 'no-cors' 
                }).then(() => {
                    playSuccessSound(); // Play the "Ding!"
                    curPill.innerText = "完成 ✓";
                    curPill.classList.add('completed');
                    document.getElementById('status').innerText = "儲存成功! (saved)";
                    setTimeout(closeModal, 1200);
                });
            };
        }

        function closeModal() { 
            document.getElementById('overlay').style.display = 'none'; 
            document.getElementById('startBtn').style.display = 'flex';
            document.getElementById('stopBtn').style.display = 'none';
        }
    </script>
</body>
</html>
