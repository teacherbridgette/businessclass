<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>student recording game</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0984e3;
            --primary-green: #00b894;
            --accent-yellow: #f1c40f;
            --done-color: #2ecc71;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #1e272e;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .game-canvas {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background: #ffffff;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2%;
            box-sizing: border-box;
            border-radius: 15px;
            border: 8px solid var(--primary-blue);
        }

        h1 { color: var(--primary-green); margin: 0; font-size: 4vw; font-weight: 600; text-transform: lowercase; }
        p.subtitle { color: var(--primary-blue); font-size: 1.5vw; margin-bottom: 2%; text-transform: lowercase; }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5%;
            width: 90%;
            height: 70%;
        }

        .pill {
            background: linear-gradient(145deg, var(--primary-blue), #0764ad);
            border: none;
            border-radius: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5vw;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0.4vw 0 #054475;
            transition: all 0.1s;
            color: white;
            text-transform: lowercase;
        }

        .pill:nth-child(even) {
            background: linear-gradient(145deg, var(--primary-green), #009477);
            box-shadow: 0 0.4vw 0 #00705a;
        }

        .pill.completed {
            background: var(--done-color) !important;
            box-shadow: 0 0.4vw 0 #27ae60 !important;
            cursor: default;
            pointer-events: none;
            opacity: 0.9;
        }

        .pill:not(.completed):active { transform: translateY(0.3vw); box-shadow: 0 0.1vw 0 #054475; }

        #recordingOverlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(45, 52, 54, 0.95);
            justify-content: center; align-items: center;
            z-index: 100; border-radius: 7px;
        }

        .modal-content {
            background: white; padding: 3%; border-radius: 3vw;
            text-align: center; width: 45%; border: 6px solid var(--primary-green);
        }

        .word-display {
            font-size: 6vw; font-weight: 600; color: #d63031;
            margin: 3% 0; padding: 2%; border-bottom: 4px dashed #b2bec3;
            text-transform: lowercase;
        }

        .controls { display: flex; flex-direction: column; gap: 1.5vh; }

        button {
            font-family: 'Fredoka', sans-serif; font-size: 2vw; font-weight: 600;
            padding: 2%; border: none; border-radius: 50px;
            cursor: pointer; color: white; text-transform: lowercase;
            box-shadow: 0 0.3vw 0 rgba(0,0,0,0.2);
        }

        .btn-start { background-color: var(--primary-green); }
        .btn-end { background-color: #d63031; display: none; }
        .btn-close { background-color: #636e72; margin-top: 1vh; }

        #statusText {
            margin-top: 1.5vh; font-size: 1.4vw; color: var(--primary-blue);
            font-weight: 600; text-transform: lowercase;
        }
    </style>
</head>
<body>

    <div class="game-canvas">
        <h1>pick your student number</h1>
        <p class="subtitle">tap your number to see your word and record!</p>
        <div class="grid" id="pillGrid"></div>

        <div id="recordingOverlay">
            <div class="modal-content">
                <h2 style="margin:0; font-size: 2.5vw; color: var(--primary-blue); text-transform: lowercase;">say this word:</h2>
                <div id="wordBox" class="word-display">word</div>
                <div class="controls">
                    <button id="startBtn" class="btn-start" onclick="startRecording()">start record</button>
                    <button id="endBtn" class="btn-end" onclick="stopRecording()">end & save</button>
                    <button class="btn-close" onclick="closeModal()">close</button>
                </div>
                <div id="statusText">ready...</div>
            </div>
        </div>
    </div>

    <script>
        const words = ["draw", "read", "write", "sing", "dance", "jump", "swim"];
        const grid = document.getElementById('pillGrid');
        const overlay = document.getElementById('recordingOverlay');
        const wordBox = document.getElementById('wordBox');
        const statusText = document.getElementById('statusText');
        
        let currentNumber, currentWord, currentPillElement, mediaRecorder, audioChunks = [];

        // UPDATED SCRIPT URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwDdoKEP0SzGhgp79wmyUaPmBTvjeFZb7tTwo8zuQsgUq8orylgCSaZqaNFdxrYJNdf4A/exec';

        for (let i = 1; i <= 25; i++) {
            const pill = document.createElement('div');
            pill.className = 'pill';
            pill.innerText = i;
            pill.onclick = () => openRecording(i, pill);
            grid.appendChild(pill);
        }

        function openRecording(num, el) {
            currentNumber = num; currentPillElement = el;
            currentWord = words[Math.floor(Math.random() * words.length)];
            wordBox.innerText = currentWord;
            overlay.style.display = 'flex';
            resetButtons();
        }

        function resetButtons() {
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('endBtn').style.display = 'none';
            statusText.innerText = "tap start to record your voice!";
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = uploadFile;
                mediaRecorder.start();
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('endBtn').style.display = 'block';
                statusText.innerText = "recording... speak clearly!";
            } catch (err) { statusText.innerText = "error: mic access required."; }
        }

        function stopRecording() {
            mediaRecorder.stop();
            document.getElementById('endBtn').style.display = 'none';
            statusText.innerText = "sending to drive...";
        }

        function uploadFile() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
                const base64data = reader.result.split(',')[1];
                fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ audio: base64data, filename: `student_${currentNumber}_${currentWord}.webm` }),
                    mode: 'no-cors'
                }).then(() => {
                    currentPillElement.innerText = "done ✓";
                    currentPillElement.classList.add('completed');
                    statusText.innerText = "saved!";
                    setTimeout(closeModal, 1000);
                });
            };
        }

        function closeModal() {
            overlay.style.display = 'none';
            if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
        }
    </script>
</body>
</html>
