<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>student recording game</title>
    <style>
        :root { --blue: #0984e3; --green: #00b894; --done: #2ecc71; }
        
        body { 
            font-family: "Comic Sans MS", cursive, sans-serif; 
            background-color: #1e272e; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            text-transform: lowercase; 
        }

        .game-canvas { 
            width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; 
            background: #ffffff; position: relative; display: flex; 
            flex-direction: column; align-items: center; padding: 2%; 
            box-sizing: border-box; border-radius: 20px; border: 10px solid var(--blue); 
        }

        h1 { color: var(--green); margin: 0; font-size: 4vw; font-weight: bold; }
        
        .grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); 
            gap: 1.5%; width: 95%; height: 70%; margin-top: 10px;
        }

        .pill { 
            background: var(--blue); border: none; border-radius: 100px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 3vw; font-weight: bold; cursor: pointer; color: white; 
            box-shadow: 0 0.5vw 0 #054475; transition: 0.1s;
        }

        .pill:nth-child(even) { background: var(--green); box-shadow: 0 0.5vw 0 #00705a; }

        .pill.completed { 
            background: var(--done) !important; 
            box-shadow: 0 0.5vw 0 #27ae60 !important; 
            pointer-events: none; opacity: 0.7; 
        }

        #overlay { 
            display: none; position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.9); 
            justify-content: center; align-items: center; z-index: 100; 
        }

        .modal { 
            background: white; padding: 5%; border-radius: 40px; 
            text-align: center; width: 50%; border: 8px solid var(--green); 
        }

        .word-display { font-size: 8vw; color: #d63031; margin: 20px 0; font-weight: bold; }
        
        button { 
            font-family: inherit; font-size: 2.5vw; padding: 3%; 
            border-radius: 60px; border: none; cursor: pointer; 
            color: white; width: 100%; margin-bottom: 10px; text-transform: lowercase;
            font-weight: bold;
        }

        .btn-start { background: var(--green); }
        .btn-stop { background: #d63031; display: none; }
        .btn-close { background: #636e72; }
        #status { font-size: 1.5vw; margin-top: 10px; color: var(--blue); font-weight: bold; }
    </style>
</head>
<body>

    <div class="game-canvas">
        <h1>pick your student number</h1>
        <div class="grid" id="grid"></div>
        
        <div id="overlay">
            <div class="modal">
                <div class="word-display" id="wordBox">word</div>
                <button id="startBtn" class="btn-start" onclick="startRec()">start record</button>
                <button id="stopBtn" class="btn-stop" onclick="stopRec()">end & save</button>
                <button class="btn-close" onclick="closeModal()">close</button>
                <div id="status">ready...</div>
            </div>
        </div>
    </div>

    <script>
        // YOUR NEWEST WEB APP URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwZnYExVEL9ooojJ4MicbuX_MGm6r5xnpUAYzJ1sQzCuP8Wa_A2fg6sPEiUAXGnL2okOw/exec';

        const words = ["draw", "read", "write", "sing", "dance", "jump", "swim"];
        let curNum, curPill, recorder, chunks = [];

        for (let i = 1; i <= 25; i++) {
            const p = document.createElement('div');
            p.className = 'pill'; p.innerText = i;
            p.onclick = () => {
                curNum = i; curPill = p;
                document.getElementById('wordBox').innerText = words[Math.floor(Math.random()*words.length)];
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('status').innerText = "tap start to record";
            };
            document.getElementById('grid').appendChild(p);
        }

        async function startRec() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(stream);
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = upload;
                recorder.start();
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                document.getElementById('status').innerText = "recording...";
            } catch (err) {
                document.getElementById('status').innerText = "mic error - please allow access";
            }
        }

        function stopRec() {
            recorder.stop();
            document.getElementById('status').innerText = "sending to drive...";
        }

        function upload() {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = () => {
                const base64 = reader.result.split(',')[1];
                
                // Using URLSearchParams to bypass iPad security blocks
                const params = new URLSearchParams();
                params.append('audio', base64);
                params.append('filename', 'student_' + curNum + '_' + Date.now() + '.webm');

                fetch(scriptURL, {
                    method: 'POST',
                    body: params,
                    mode: 'no-cors' 
                }).then(() => {
                    curPill.innerText = "done ✓";
                    curPill.classList.add('completed');
                    document.getElementById('status').innerText = "successfully saved!";
                    setTimeout(closeModal, 1500);
                }).catch(err => {
                    document.getElementById('status').innerText = "error - try again";
                });
            };
        }

        function closeModal() { 
            document.getElementById('overlay').style.display = 'none'; 
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
        }
    </script>
</body>
</html>
